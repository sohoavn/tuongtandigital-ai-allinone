# ============================================================
# TuongTanDigital-AI v3.0 — Netlify Configuration
# Fixed: COOP header blocking Google Sign-In popup
# Fixed: CSP allowing Google Identity Services
# ============================================================

[build]
  publish = "."
  command = "echo 'Static site — no build needed'"

# Redirect all routes to index.html (SPA support)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ===== MAIN HEADERS — áp dụng cho toàn bộ app =====
[[headers]]
  for = "/*"
  [headers.values]

    # QUAN TRỌNG: COOP phải là unsafe-none để Google popup hoạt động
    # Nếu set "same-origin" thì Google Sign-In popup BỊ CHẶN
    Cross-Origin-Opener-Policy   = "unsafe-none"
    Cross-Origin-Embedder-Policy = "unsafe-none"

    # Các header bảo mật khác (an toàn)
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"

    # CSP đầy đủ — cho phép tất cả Google domains cần thiết
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://apis.google.com https://unpkg.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://mozilla.github.io https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com https://www.gstatic.com; font-src 'self' https://fonts.gstatic.com data:; img-src * data: blob:; connect-src 'self' https://generativelanguage.googleapis.com https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://script.google.com https://script.googleusercontent.com https://lh3.googleusercontent.com https://lh4.googleusercontent.com https://lh5.googleusercontent.com https://lh6.googleusercontent.com https://firebaseapp.com; frame-src https://accounts.google.com https://content.googleapis.com https://www.google.com; worker-src 'self' blob:; media-src 'self' blob: data: https:; object-src 'none';"

# ===== Service Worker — không được cache =====
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control                = "no-cache, no-store, must-revalidate"
    Cross-Origin-Opener-Policy   = "unsafe-none"
    Cross-Origin-Embedder-Policy = "unsafe-none"

# ===== Static assets — cache dài =====
[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
